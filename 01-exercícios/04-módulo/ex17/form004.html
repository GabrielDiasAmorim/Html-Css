<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="cadastro.php" method="get" autocorrect="on">
        <fieldset>
            <legend>Dados pessoais</legend>
        <p>
            <label for="inome">nome</label>
            <input type="text" name="nome" id="inome" minlength="5" maxlength="20" required>
        </p>
        <p>
            <label for="iemail">email</label>
            <input type="email" name="email" id="iemail" autocomplete="email" required>
        </p>
        <p>
            <label for="itel">telefone</label>
            <input type="tel" name="tel" id="itel" autocomplete="tel" required placeholder="(xx) xxxxx-xxxx" minlength="9" maxlength="15">
        </p>
        <!--estudar mais sobre regex-->
        <p>
            <input type="submit" value="enviar">
            <input type="reset" value="limpar">
        </p>
    </fieldset>
    </form>
</body>
</html>
