<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="cadastro.php" method="get" autocorrect="on">
        <p>
            <label for="icor">cor:</label>
            <input type="color" name="cor" id="icor">
            <input type="color" name="color" id="icolor" value="#17ab89">
        </p>
        <p>
            <label for="inivel">nível de satisfação</label>
            <input type="range" name="nivel" id="inivel">
            <input type="range" name="nivel" id="inivel" min="0" max="5" value="0">
        </p>
        <p>
            <label for="ifoto">foto de perfil</label>
            <input type="file" name="foto" id="ifoto">
        </p>
        <p>
            <input type="submit" value="enviar">
            <input type="reset" value="limpar">
        </p>
    </form>
</body>
</html>
