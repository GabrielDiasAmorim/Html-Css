<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vamos brincar</title>
    <style>
        div#fora {
            height: 96vh;
            background-color: #bd7df5;
            position: relative;
        }
        div#dentro {
            height: 20px;
            height: 30px;
            background-color: #f5ff40;
            position: absolute;
            margin: 0px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="fora">
        <div id="dentro"></div>
    </div>
</body>
</html>
