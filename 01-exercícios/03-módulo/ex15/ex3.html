<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid gray;
            padding: 10px;
        }
        th{
            background-color: lightgray;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th rowspan="2" scope="col">areas</th>
            <th rowspan="2" scope="col">disciplina</th>
            <th colspan="2" scope="col">notas</th>
            <th rowspan="2" scope="col">media</th>
        </tr>
        <tr>
            <th rowspan="4"  scope="rowgroup" class="nao">exatas</th>
            <td>matemática</td>
            <td>0.0</td>
            <td>0.0</td>
            <!--<td>0.0</td>-->
        </tr>
        <tr>
            <td>física</td>
            <td>0.0</td>
            <td>0.0</td>
            <!--<td>0.0</td>-->
        </tr>
        <tr>
            <td>química</td>
            <td>0.0</td>
            <td>0.0</td>
           <!--<td>0.0</td>-->
        </tr>
        <tr>
            <td>biologia</td>
            <td>0.0</td>
            <td>0.0</td>
            <!--<td>0.0</td>-->
        </tr>
        <tr>
            <th colspan="3">media de exatas</th>
            <td>0.0</td>
        </tr>
        <tr>
            
            <th rowspan="2" scope="rowgroup" class="nao">humanas</th>

            <td>história</td>
            <td>0.0</td>
            <td>0.0</td>
            <!--<td>0.0</td> -->
        </tr>
        <tr>
            <td>geografia</td>
            <td>0.0</td>
            <td>0.0</td>
           <!-- <td>0.0</td>-->
        </tr>
        <tr>
            <th colspan="3">media de humanas</th>
            <td>0.0</td>
        </tr>
    </table>
</body>
</html>
