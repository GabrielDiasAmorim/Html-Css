<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela</title>
</head>
<body>
    <table>
        <tr>
            <th scope="col">areas</th>
            <th scope="col">disciplina</th>
            <th scope="col">notas</th>
            <th scope="col">media</th>
        </tr>
        <tr>
            <th rowspan="4"  scope="rowgroup">exatas</th>
        </tr>
        <td>matemática</td>
        <td>física</td>
        <td>química</td>
        <td>biologia</td>
        <tr>
            <th colspan="4">media de exatas</th>
            <td>0.0</td>
        </tr>
        <tr>
            
            <th rowspan="2" scope="rowgroup">humanas</th>
        </tr>
        <td>história</td>
        <td>geografia</td>
        <tr>
            <th colspan="4">media de humanas</th>
            <td>0.0</td>
        </tr>
    </table>
</body>
</html>
